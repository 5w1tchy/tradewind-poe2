name: Release

# Tag-driven releases. A plain semver tag publishes to the stable channel
# (latest.yml); a pre-release tag (vX.Y.Z-beta.N) is published as a GitHub
# pre-release (beta.yml) for the demo channel. See the "Publish release" step.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Build the installer only. electron-builder still generates the update
      # manifest (latest.yml / beta.yml) into release/. We do NOT let it publish:
      # its parallel uploads race and create duplicate releases for the same tag.
      - name: Build installer
        run: npx electron-builder --win --publish never

      # Create the release and upload every artifact in one atomic call, so the
      # installer, blockmap, and channel manifest always land together. A tag
      # with a prerelease suffix (vX.Y.Z-beta.N) is a GitHub pre-release (demo
      # channel); a plain tag is the latest stable release.
      - name: Create GitHub release
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          flag="--latest"
          [[ "$tag" == *-* ]] && flag="--prerelease"
          files=(release/*-setup.exe release/*-setup.exe.blockmap)
          for y in release/latest.yml release/beta.yml release/alpha.yml; do
            [[ -f "$y" ]] && files+=("$y")
          done
          # Re-runs on the same tag: replace any existing release (keeps the tag).
          gh release delete "$tag" --yes 2>/dev/null || true
          gh release create "$tag" "${files[@]}" --title "$tag" --notes "Automated release $tag" $flag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
