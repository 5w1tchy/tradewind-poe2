name: Release

# Tag-driven releases. A plain semver tag publishes to the stable channel
# (latest.yml); a pre-release tag (vX.Y.Z-beta.N) is published as a GitHub
# pre-release (beta.yml) for the demo channel. See the "Publish release" step.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Builds the installer + update manifest and uploads them to a DRAFT
      # GitHub release for this tag.
      - name: Package and upload to draft release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Flip the draft to a published release so auto-update can see it. A tag
      # with a prerelease suffix (vX.Y.Z-beta.N) becomes a GitHub pre-release
      # (demo channel); a plain tag becomes the latest stable release.
      - name: Publish release
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [[ "$tag" == *-* ]]; then
            gh release edit "$tag" --draft=false --prerelease
          else
            gh release edit "$tag" --draft=false --prerelease=false --latest
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
